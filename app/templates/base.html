<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPT Selector — {% block title %}{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
    --primary: #1435AD;
    --accent: #1435AD;
    --text: #1435AD;
    --bg: #f0f4ff;
    --card: #ffffff;
    --card2: #f0f4ff;
    --muted: #6c7a9c;
    --border: #dde3f0;
    --green: #16a34a;
    --shadow: 0 2px 12px rgba(20, 53, 173, 0.12);
}
* { box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
}
.navbar {
    background: #ffffff;
    box-shadow: 0 1px 8px rgba(20,53,173,0.10);
    border-bottom: 1px solid var(--border);
}
.navbar-brand { color: var(--primary) !important; font-weight: 700; }
.navbar-brand span { color: var(--accent) !important; }

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
}
.card-header {
    background: var(--primary);
    color: #ffffff !important;
    border-radius: 14px 14px 0 0 !important;
    padding: 14px 20px;
    font-weight: 600;
}

.btn-primary {
    background: var(--primary);
    border: none;
}
.btn-primary:hover {
    background: #0f2a8a;
}

.step-card {
    border: none;
    box-shadow: 0 4px 15px rgba(20, 53, 173, 0.15);
    transition: transform 0.2s;
}
.step-card:hover {
    transform: translateY(-4px);
}

/* Остальные стили оставляем */
.table th { background: #f0f4ff; }
.alert-success { background: #ecfdf5; color: #15803d; }
.winner-row td { background: #ecfdf5 !important; color: #15803d !important; font-weight: 700; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">DPT <span>Selector</span></a>
    <div class="navbar-nav ms-auto d-flex flex-row gap-1">
      <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Главная</a>
      <a class="nav-link {% if '/step1' in request.url.path %}active{% endif %}" href="/step1">1. Данные</a>
      <a class="nav-link {% if '/step2' in request.url.path %}active{% endif %}" href="/step2">2. DBSCAN+PCA</a>
      <a class="nav-link {% if '/step3' in request.url.path %}active{% endif %}" href="/step3">3. МАИ</a>
      <a class="nav-link {% if '/step4' in request.url.path %}active{% endif %}" href="/step4">4. TOPSIS</a>
      <a class="nav-link" href="/docs" target="_blank">API</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
